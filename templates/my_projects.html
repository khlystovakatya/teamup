<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои проекты</title>
</head>
<body>
    <h1>Мои проекты</h1>

    <p><strong>Вы вошли как:</strong> {{ user_name }}</p>

    <br>
    <a href="/projects">Все проекты</a>
    <br><br>
    <a href="/">На главную</a>

    <hr>

    {% if projects %}
        {% for project in projects %}
            <div style="margin-bottom: 20px;">
                <h3>{{ project.title }}</h3>
                <p>{{ project.description }}</p>
                <p><strong>Статус:</strong> {{ project.status }}</p>

                <a href="/projects/{{ project.id }}/applications">
                    Посмотреть отклики
                </a>
            </div>
            <hr>
        {% endfor %}
    {% else %}
        <p>У вас пока нет проектов.</p>
    {% endif %}
</body>
</html>
