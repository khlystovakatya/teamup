<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TeamUp</title>
</head>
<body>
    <h1>TeamUp</h1>
    <p>Сервис для поиска команды</p>

    {% if user_name %}
        <p><strong>Вы вошли как:</strong> {{ user_name }}</p>
        <p><strong>Email:</strong> {{ user_email }}</p>

        <a href="/projects">Список проектов</a>
        <br><br>
        <a href="/projects/create">Создать проект</a>
        <br><br>
        <a href="/logout">Выйти</a>
    {% else %}
        <a href="/register">Регистрация</a>
        <br><br>
        <a href="/login">Вход</a>
        <br><br>
        <a href="/projects">Список проектов</a>
    {% endif %}
</body>
</html>
