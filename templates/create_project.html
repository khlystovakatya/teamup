{% extends "base.html" %}

{% block title %}Создание проекта{% endblock %}

{% block content %}
<h1 class="page-title">Создать проект</h1>

<div class="card create-project-card">
    {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" action="/projects/create" class="form create-project-form">
        <div class="form-group">
            <label>Название проекта</label>
            <input 
                type="text"
                name="title"
                class="form-control"
                placeholder="Например: Стартап для студентов"
                required
            >
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea 
                name="description"
                class="form-control"
                placeholder="Опиши, что это за проект и кого ты ищешь"
                required
            ></textarea>
        </div>

        <button type="submit" class="button">
            Создать проект
        </button>
    </form>
</div>
{% endblock %}
