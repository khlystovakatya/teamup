<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Все проекты (админ)</title>
</head>
<body>
    <h1>Все проекты (админ)</h1>

    {% if projects %}
        {% for project in projects %}
            <div style="margin-bottom: 20px;">
                <h3>{{ project.title }}</h3>
                <p>{{ project.description }}</p>
                <p><strong>Статус:</strong> {{ project.status }}</p>
                <p><strong>Автор ID:</strong> {{ project.author_id }}</p>
            </div>
            <hr>
        {% endfor %}
    {% else %}
        <p>Проектов пока нет.</p>
    {% endif %}

    <br>
    <a href="/">На главную</a>
</body>
</html>
