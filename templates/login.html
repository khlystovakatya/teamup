<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <h1>Вход</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
        <div>
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>
        <br>

        <div>
            <label>Пароль:</label>
            <input type="password" name="password" required>
        </div>
        <br>

        <button type="submit">Войти</button>
    </form>

    <br>
    <a href="/">На главную</a>
</body>
</html>
