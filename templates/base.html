<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TeamUp{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a class="logo" href="/">TeamUp</a>

            <nav class="nav">
                <div class="nav-left">
                    <a href="/projects">Проекты</a>

                    {% if user_name %}
                        <a href="/projects/create">Создать проект</a>
                        <a href="/my-projects">Мои проекты</a>
                        <a href="/my-applications">Мои отклики</a>

                        {% if user_role == "admin" %}
                            <a href="/admin/projects">Админ</a>
                        {% endif %}
                    {% endif %}
                </div>

                <div class="nav-right">
                    {% if user_name %}
                        <a href="/logout" class="nav-exit">Выйти</a>
                    {% else %}
                        <a href="/login">Вход</a>
                        <a href="/register" class="nav-button">Регистрация</a>
                    {% endif %}
                </div>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
