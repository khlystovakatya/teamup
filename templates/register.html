{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<h1 class="page-title">Регистрация</h1>

<div class="card">
    {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
    {% endif %}

    <form method="post" action="/register" class="form">
        <div class="form-group">
            <label>Имя</label>
            <input 
                type="text"
                name="first_name"
                class="form-control"
                placeholder="Введите имя"
                required
            >
        </div>

        <div class="form-group">
            <label>Фамилия</label>
            <input 
                type="text"
                name="last_name"
                class="form-control"
                placeholder="Введите фамилию"
                required
            >
        </div>

        <div class="form-group">
            <label>Email</label>
            <input 
                type="email"
                name="email"
                class="form-control"
                placeholder="Введите email"
                required
            >
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input 
                type="password"
                name="password"
                class="form-control"
                placeholder="Придумайте пароль"
                required
            >
        </div>

        <button class="button" type="submit">
            Зарегистрироваться
        </button>
    </form>

    <div style="margin-top: 20px;">
        <span>Уже есть аккаунт?</span>
        <a href="/login" style="color: #2563eb; font-weight: 600;">
            Войти
        </a>
    </div>
</div>
{% endblock %}
